<?xml version="1.0" encoding="UTF-8"?>
<svg width="100%" viewBox="0 0 800 580" xmlns="http://www.w3.org/2000/svg" id="svg-comedor">
      <rect x="0" y="0" width="800" height="580" fill="#f8fafc"/>
      <rect x="30" y="30" width="740" height="520" rx="0" fill="#eef2f7" stroke="#c8d0dc" stroke-width="1"/>

      <!-- Gran sala comedor -->
      <rect x="60" y="50" width="520" height="300" fill="#fef3c7" stroke="#1a1a1a" stroke-width="2"/>
      <text class="room-label" x="320" y="200" text-anchor="middle" font-size="12" fill="#78350f">Gran sala comedor</text>

      <!-- Filas de mesas (decorativas) -->
      <!-- Fila 1 -->
      <rect x="100" y="80" width="440" height="28" fill="none" stroke="#fcd34d" stroke-width="0.8" rx="2"/>
      <rect x="100" y="118" width="440" height="28" fill="none" stroke="#fcd34d" stroke-width="0.8" rx="2"/>
      <rect x="100" y="156" width="440" height="28" fill="none" stroke="#fcd34d" stroke-width="0.8" rx="2"/>
      <rect x="100" y="194" width="440" height="28" fill="none" stroke="#fcd34d" stroke-width="0.8" rx="2"/>
      <rect x="100" y="232" width="440" height="28" fill="none" stroke="#fcd34d" stroke-width="0.8" rx="2"/>
      <rect x="100" y="270" width="440" height="28" fill="none" stroke="#fcd34d" stroke-width="0.8" rx="2"/>
      <rect x="100" y="308" width="440" height="28" fill="none" stroke="#fcd34d" stroke-width="0.8" rx="2"/>

      <!-- Cocina -->
      <rect x="60" y="370" width="260" height="140" fill="#fef3c7" stroke="#1a1a1a" stroke-width="2"/>
      <rect x="60" y="370" width="260" height="30" fill="#fde68a" stroke="#1a1a1a" stroke-width="1"/>
      <text class="room-label" x="100" y="390" font-size="9" fill="#78350f">Cocina / preparación</text>
      <text class="room-label" x="190" y="450" text-anchor="middle" font-size="9" fill="#78350f">Área de cocina</text>

      <!-- Baños -->
      <rect x="340" y="370" width="90" height="140" fill="#fce7f3" stroke="#1a1a1a" stroke-width="1.5"/>
      <text class="room-label" x="385" y="445" text-anchor="middle" font-size="9" fill="#831843">SS Muj.</text>

      <rect x="440" y="370" width="90" height="140" fill="#fce7f3" stroke="#1a1a1a" stroke-width="1.5"/>
      <text class="room-label" x="485" y="445" text-anchor="middle" font-size="9" fill="#831843">SS Hom.</text>

      <!-- Circulación vertical -->
      <rect x="590" y="50" width="110" height="460" fill="#f1f5f9" stroke="#1a1a1a" stroke-width="1.5"/>
      <text class="room-label" x="645" y="290" text-anchor="middle" font-size="9" fill="#334155">Circulación</text>

      <!-- Estacionamiento accesible -->
      <rect x="30" y="480" width="560" height="70" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
      <text class="room-label" x="315" y="519" text-anchor="middle" font-size="9" fill="#475569">Estacionamiento accesible</text>

      <!-- Símbolo accesible simplificado x5 -->
      <text x="90" y="520" font-size="14" fill="#475569" text-anchor="middle">♿</text>
      <text x="160" y="520" font-size="14" fill="#475569" text-anchor="middle">♿</text>
      <text x="230" y="520" font-size="14" fill="#475569" text-anchor="middle">♿</text>
      <text x="300" y="520" font-size="14" fill="#475569" text-anchor="middle">♿</text>
      <text x="370" y="520" font-size="14" fill="#475569" text-anchor="middle">♿</text>

      <text x="770" y="50" font-size="10" fill="#888" text-anchor="end" font-family="sans-serif">N ↑</text>
    </svg>