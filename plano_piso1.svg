<?xml version="1.0" encoding="UTF-8"?>
<svg width="100%" viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" id="svg-p1">
      <rect x="0" y="0" width="900" height="520" fill="#f8fafc"/>

      <!-- Masa exterior -->
      <rect x="20" y="20" width="860" height="480" fill="#eef2f7" stroke="#c8d0dc" stroke-width="1"/>

      <!-- Zona norte: administración / oficinas abiertas -->
      <rect x="60" y="40" width="680" height="200" fill="#ede9fe" stroke="#1a1a1a" stroke-width="2"/>
      <text class="room-label" x="400" y="80" text-anchor="middle" font-size="11" fill="#4c1d95">Área administrativa — planta abierta</text>

      <!-- Subdivisiones admin -->
      <rect x="60" y="40" width="200" height="200" fill="#ede9fe" stroke="#1a1a1a" stroke-width="1.2"/>
      <text class="room-label" x="160" y="145" text-anchor="middle" font-size="9" fill="#4c1d95">Sala de juntas</text>

      <rect x="260" y="40" width="200" height="200" fill="#ede9fe" stroke="#1a1a1a" stroke-width="1.2"/>
      <text class="room-label" x="360" y="145" text-anchor="middle" font-size="9" fill="#4c1d95">Oficinas abiertas</text>

      <rect x="460" y="40" width="150" height="200" fill="#ede9fe" stroke="#1a1a1a" stroke-width="1.2"/>
      <text class="room-label" x="535" y="145" text-anchor="middle" font-size="9" fill="#4c1d95">Recepción</text>

      <rect x="610" y="40" width="130" height="200" fill="#f8f4ff" stroke="#1a1a1a" stroke-width="1.2"/>
      <text class="room-label" x="675" y="145" text-anchor="middle" font-size="9" fill="#4c1d95">Sala espera</text>

      <!-- Franja circulación horizontal -->
      <rect x="60" y="240" width="750" height="40" fill="#f1f5f9" stroke="#1a1a1a" stroke-width="1.5"/>
      <text class="room-label" x="435" y="264" text-anchor="middle" font-size="9" fill="#334155">Corredor principal</text>

      <!-- Zona sur: aulas + baños -->
      <rect x="60" y="280" width="140" height="180" fill="#dbeafe" stroke="#1a1a1a" stroke-width="1.5"/>
      <text class="room-label" x="130" y="373" text-anchor="middle" font-size="9" fill="#1e40af">Aula 101</text>

      <rect x="210" y="280" width="140" height="180" fill="#dbeafe" stroke="#1a1a1a" stroke-width="1.5"/>
      <text class="room-label" x="280" y="373" text-anchor="middle" font-size="9" fill="#1e40af">Aula 102</text>

      <rect x="360" y="280" width="100" height="180" fill="#fce7f3" stroke="#1a1a1a" stroke-width="1.5"/>
      <text class="room-label" x="410" y="373" text-anchor="middle" font-size="9" fill="#831843">SS</text>

      <rect x="470" y="280" width="140" height="180" fill="#dbeafe" stroke="#1a1a1a" stroke-width="1.5"/>
      <text class="room-label" x="540" y="373" text-anchor="middle" font-size="9" fill="#1e40af">Aula 103</text>

      <!-- Circulación vertical der -->
      <rect x="750" y="40" width="80" height="420" fill="#f1f5f9" stroke="#1a1a1a" stroke-width="1.5"/>
      <text class="room-label" x="790" y="260" text-anchor="middle" font-size="9" fill="#334155">Esc / Elev</text>

      <!-- Área exterior sur -->
      <rect x="20" y="460" width="860" height="40" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
      <text class="room-label" x="450" y="484" text-anchor="middle" font-size="9" fill="#475569">Acceso principal / exterior</text>

      <text x="880" y="40" font-size="10" fill="#888" text-anchor="end" font-family="sans-serif">N ↑</text>
    </svg>