<?xml version="1.0" encoding="UTF-8"?>
<svg width="100%" viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" id="svg-sitio">
      <rect x="0" y="0" width="900" height="560" fill="#f0f4f0"/>

      <!-- Terreno general / calle -->
      <rect x="0" y="0" width="900" height="560" fill="#e8ede8"/>

      <!-- Acceso vial -->
      <path d="M0 400 Q200 360 400 380 Q600 400 900 370" fill="none" stroke="#c8d0c8" stroke-width="30"/>
      <path d="M0 400 Q200 360 400 380 Q600 400 900 370" fill="none" stroke="#dde4dd" stroke-width="26"/>

      <!-- Edificio biblioteca (izquierda) -->
      <rect x="60" y="180" width="200" height="160" fill="#d1fae5" stroke="#1a1a1a" stroke-width="2"/>
      <text class="room-label" x="160" y="265" text-anchor="middle" font-size="10" fill="#065f46">Biblioteca</text>

      <!-- Comedor (centro-izq, más bajo) -->
      <rect x="280" y="200" width="200" height="200" fill="#fef3c7" stroke="#1a1a1a" stroke-width="2"/>
      <text class="room-label" x="380" y="305" text-anchor="middle" font-size="10" fill="#78350f">Comedor</text>

      <!-- Edificio aulas (derecha, en altura) -->
      <rect x="530" y="80" width="280" height="340" fill="#dbeafe" stroke="#1a1a1a" stroke-width="2.5"/>
      <text class="room-label" x="670" y="255" text-anchor="middle" font-size="11" fill="#1e40af">Edificio de aulas</text>
      <text class="room-label" x="670" y="270" text-anchor="middle" font-size="9" fill="#3b82f6">5 niveles</text>

      <!-- Franjas horizontales en edificio aulas (pisos) -->
      <line x1="530" y1="148" x2="810" y2="148" stroke="#1a1a1a" stroke-width="0.8" opacity="0.4"/>
      <line x1="530" y1="216" x2="810" y2="216" stroke="#1a1a1a" stroke-width="0.8" opacity="0.4"/>
      <line x1="530" y1="284" x2="810" y2="284" stroke="#1a1a1a" stroke-width="0.8" opacity="0.4"/>
      <line x1="530" y1="352" x2="810" y2="352" stroke="#1a1a1a" stroke-width="0.8" opacity="0.4"/>

      <!-- Volumen anexo derecho -->
      <rect x="820" y="200" width="60" height="200" fill="#f1f5f9" stroke="#1a1a1a" stroke-width="1.5"/>

      <!-- Área exterior / estacionamiento -->
      <rect x="60" y="420" width="420" height="100" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
      <text class="room-label" x="270" y="474" text-anchor="middle" font-size="9" fill="#475569">Estacionamiento / acceso</text>

      <!-- Vegetación (círculos) -->
      <circle cx="40" cy="120" r="22" fill="#bbf7d0" stroke="#4ade80" stroke-width="1" opacity="0.7"/>
      <circle cx="90" cy="90" r="16" fill="#bbf7d0" stroke="#4ade80" stroke-width="1" opacity="0.7"/>
      <circle cx="150" cy="75" r="20" fill="#bbf7d0" stroke="#4ade80" stroke-width="1" opacity="0.7"/>
      <circle cx="450" cy="110" r="18" fill="#bbf7d0" stroke="#4ade80" stroke-width="1" opacity="0.7"/>
      <circle cx="500" cy="80" r="14" fill="#bbf7d0" stroke="#4ade80" stroke-width="1" opacity="0.7"/>

      <!-- Flecha norte -->
      <text x="870" y="50" font-size="10" fill="#888" text-anchor="end" font-family="sans-serif">N ↑</text>

      <!-- Escala gráfica -->
      <line x1="60" y1="540" x2="260" y2="540" stroke="#666" stroke-width="1.5"/>
      <line x1="60" y1="535" x2="60" y2="545" stroke="#666" stroke-width="1.5"/>
      <line x1="160" y1="535" x2="160" y2="545" stroke="#666" stroke-width="1.5"/>
      <line x1="260" y1="535" x2="260" y2="545" stroke="#666" stroke-width="1.5"/>
      <text x="60" y="530" font-size="8" fill="#666" text-anchor="middle" font-family="sans-serif">0</text>
      <text x="160" y="530" font-size="8" fill="#666" text-anchor="middle" font-family="sans-serif">25m</text>
      <text x="260" y="530" font-size="8" fill="#666" text-anchor="middle" font-family="sans-serif">50m</text>
    </svg>